<!DOCTYPE html>
<html>
<head>
    <title>Security Warning</title>
    <link rel="stylesheet" href="wstyle.css">
</head>

<body>

<div class="container">

    <h1> Deceptive Site Ahead</h1>

    <p class="subtitle">
        Attackers on this site may try to steal your information
    </p>

    <div class="info-box">
        <p><strong>Blocked URL:</strong></p>
        <p id="urlText"></p>

        <p><strong>Risk Score:</strong> <span id="riskScore"></span></p>
    </div>

    <div class="buttons">
        <button id="safeBtn" class="safe">Back to Safety</button>
        <button id="unsafeBtn" class="unsafe">Proceed Anyway</button>
    </div>

    <p class="footer">
        AI Powered Protection * Stay Safe Online
    </p>

</div>

<script src="warning.js"></script>

</body>
</html>
